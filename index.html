<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de estudiantes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-morado {
            background-color: #82c142;
            color: white;
        }

        .btn-morado {
            background-color: #82c142;
            color: white;
        }

        .btn-morado:hover {
            background-color: #82c142;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4 text-white bg-morado p-3 rounded">
        Registro de Personas
    </h2>

    <div class="row mb-3">
        <div class="col">
            <input type="text" id="nombre" class="form-control" placeholder="Nombre">
        </div>
        <div class="col">
            <input type="number" id="edad" class="form-control" placeholder="Edad">
        </div>
        <div class="col">
            <input type="text" id="telefono" class="form-control" placeholder="Teléfono">
        </div>
        <div class="col">
            <input type="text" id="direccion" class="form-control" placeholder="Dirección">
        </div>
        <div class="col">
            <button id="btnAgregar" class="btn btn-morado w-100">
                Agregar
            </button>
        </div>
    </div>

    <table class="table table-bordered text-center">
        <thead class="bg-morado">
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaDatos">
        </tbody>
    </table>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Tu archivo JS -->
<script src="script.js"></script>

</body>
</html>
